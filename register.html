<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Bugema University Online Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="font-['Inter'] bg-gradient-to-br from-[#003366] via-[#004080] to-[#003366] min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
        <!-- Logo at top of form -->
        <div class="text-center mb-8">
            <a href="index.html">
                <img src="logo.png" alt="Bugema University Logo" class="w-24 h-24 mx-auto object-contain drop-shadow-lg">
            </a>
            <h1 class="text-2xl font-bold text-white mt-4">Create Your Account</h1>
        </div>
        
        <!-- Registration Form Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-[#003366] text-center mb-6">Register</h2>
            
            <form id="register-form" class="space-y-5">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input id="name" name="name" type="text" placeholder="Enter your full name" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:border-[#003366] focus:ring-2 focus:ring-[#FFCC00]/20 transition-all" required>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <input id="email" name="email" type="email" placeholder="Enter your email" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:border-[#003366] focus:ring-2 focus:ring-[#FFCC00]/20 transition-all" required>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <input id="password" name="password" type="password" placeholder="Create a password" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:border-[#003366] focus:ring-2 focus:ring-[#FFCC00]/20 transition-all" required>
                </div>
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                    <input id="confirm-password" name="confirm-password" type="password" placeholder="Confirm your password" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:border-[#003366] focus:ring-2 focus:ring-[#FFCC00]/20 transition-all" required>
                </div>
                <button type="submit" class="w-full rounded-xl bg-[#003366] px-4 py-3.5 font-semibold text-white hover:bg-[#004080] transition-all duration-300 shadow-lg hover:shadow-xl">
                    Register
                </button>
            </form>
            
            <p class="mt-6 text-center text-sm text-gray-600">
                Already have an account? <a href="login.html" class="text-[#003366] font-semibold hover:text-[#FFCC00] transition-colors">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            alert('Registration submitted!');
        });
    </script>
</body>
</html>
