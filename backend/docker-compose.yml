version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bu-elibrary-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=bugema_elibrary
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - elibrary-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/v2/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: bu-elibrary-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=bugema_elibrary
      - MYSQL_USER=elibrary
      - MYSQL_PASSWORD=elibrarypass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database_migration_refresh_tokens.sql:/docker-entrypoint-initdb.d/01-refresh-tokens.sql
      - ./database_migration_rbac.sql:/docker-entrypoint-initdb.d/02-rbac.sql
      - ./database_migration_borrowing.sql:/docker-entrypoint-initdb.d/03-borrowing.sql
      - ./database_migration_research.sql:/docker-entrypoint-initdb.d/04-research.sql
      - ./database_migration_printing.sql:/docker-entrypoint-initdb.d/05-printing.sql
      - ./database_migration_events.sql:/docker-entrypoint-initdb.d/06-events.sql
    networks:
      - elibrary-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bu-elibrary-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - elibrary-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    container_name: bu-elibrary-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - elibrary-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  elibrary-network:
    driver: bridge
