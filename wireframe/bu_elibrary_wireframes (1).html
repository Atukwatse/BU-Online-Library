
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace}
:root{
  --bg:#f5f5f0;--surface:#fff;--border:#222;--text:#111;--muted:#555;--light:#e8e8e0;
  --accent:#111;--radius:3px;
}
.wf-app{background:var(--bg);min-height:600px;font-family:'Courier New',monospace;color:var(--text);font-size:12px}
.top-bar{background:#111;color:#fff;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.top-bar h1{font-size:13px;font-weight:700;letter-spacing:1px;flex:1}
.screen-tabs{display:flex;gap:4px;flex-wrap:wrap}
.stab{background:transparent;border:1px solid #444;color:#aaa;padding:3px 8px;font-size:10px;cursor:pointer;border-radius:2px;font-family:monospace}
.stab.active{background:#fff;color:#111;border-color:#fff}
.view-toggle{display:flex;gap:4px;margin-left:auto}
.vtbtn{background:transparent;border:1px solid #444;color:#aaa;padding:3px 10px;font-size:10px;cursor:pointer;font-family:monospace}
.vtbtn.active{background:#fff;color:#111;border-color:#fff}
.wf-body{display:flex;gap:0;min-height:540px}
.wf-sidebar{width:160px;background:#1a1a1a;padding:12px 8px;flex-shrink:0}
.wf-sidebar h3{color:#666;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;padding:0 4px}
.wf-sidebar-group{margin-bottom:14px}
.wf-snav{list-style:none}
.wf-snav li{padding:5px 8px;color:#aaa;font-size:10px;cursor:pointer;border-radius:2px;border-left:2px solid transparent}
.wf-snav li:hover{background:#333;color:#fff}
.wf-snav li.active{background:#333;color:#fff;border-left:2px solid #fff}
.wf-canvas{flex:1;padding:16px;overflow-y:auto;background:var(--bg)}
.wf-canvas.mobile-view{display:flex;justify-content:center}
.mobile-frame{width:375px;border:2px solid #222;border-radius:8px;overflow:hidden}

/* Wireframe components */
.wf-screen{background:#fff;border:1.5px solid #222;position:relative}
.wf-screen.mobile{width:375px}
.wf-header{background:#fff;border-bottom:1.5px solid #222;padding:10px 16px;display:flex;align-items:center;gap:8px}
.wf-logo{border:1.5px solid #222;padding:4px 10px;font-size:10px;font-weight:700;white-space:nowrap}
.wf-nav{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.wf-nav span{font-size:9px;padding:3px 7px;border:1px solid #aaa;cursor:pointer}
.wf-nav span.active-nav{border:1.5px solid #222;font-weight:700}
.wf-nav-btn{border:1.5px solid #222;padding:3px 10px;font-size:9px;font-weight:700}
.wf-section{padding:14px 16px;border-bottom:1px solid #e0e0e0}
.wf-section-label{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.wf-section-label::after{content:'';flex:1;height:1px;background:#ddd}
.wf-hero{background:#f0f0ea;border:1.5px dashed #999;padding:24px 16px;text-align:center;position:relative}
.wf-hero-title{font-size:16px;font-weight:700;margin-bottom:6px}
.wf-hero-sub{font-size:10px;color:#666;margin-bottom:12px}
.wf-searchbar{display:flex;border:1.5px solid #222;overflow:hidden;max-width:480px;margin:0 auto}
.wf-searchbar input{flex:1;border:none;padding:8px 10px;font-size:11px;font-family:monospace;background:#fff;outline:none}
.wf-searchbar button{background:#222;color:#fff;border:none;padding:8px 14px;font-size:10px;font-family:monospace;cursor:pointer}
.wf-annotation{background:#fffde7;border:1px dashed #bbb;font-size:9px;color:#555;padding:3px 7px;position:absolute;border-radius:2px}
.book-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.book-card{border:1.5px solid #222;padding:8px}
.book-thumb{background:#e8e8e0;border:1px solid #ccc;height:80px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#888;margin-bottom:6px}
.book-title{font-size:9px;font-weight:700;margin-bottom:2px}
.book-author{font-size:8px;color:#666;margin-bottom:6px}
.book-btn{border:1.5px solid #222;padding:3px 8px;font-size:8px;font-weight:700;cursor:pointer;background:transparent;font-family:monospace}
.book-btn.filled{background:#222;color:#fff}
.wf-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.wf-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.wf-4col{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wf-card{border:1.5px solid #222;padding:10px}
.wf-card h4{font-size:10px;font-weight:700;margin-bottom:4px}
.wf-card p{font-size:9px;color:#666;line-height:1.5}
.wf-card .wf-badge{display:inline-block;border:1px solid #222;padding:1px 6px;font-size:8px;margin-bottom:4px}
.wf-btn{display:inline-block;border:1.5px solid #222;padding:6px 14px;font-size:10px;font-weight:700;cursor:pointer;background:transparent;font-family:monospace}
.wf-btn.filled{background:#222;color:#fff}
.wf-btn.sm{padding:3px 10px;font-size:9px}
.wf-input-group{margin-bottom:10px}
.wf-input-group label{display:block;font-size:9px;font-weight:700;margin-bottom:3px}
.wf-input{width:100%;border:1.5px solid #222;padding:7px 10px;font-size:10px;font-family:monospace;background:#fff;outline:none}
.wf-select{width:100%;border:1.5px solid #222;padding:7px 10px;font-size:10px;font-family:monospace;background:#fff;outline:none}
.wf-divider{text-align:center;font-size:9px;color:#999;margin:8px 0;display:flex;align-items:center;gap:8px}
.wf-divider::before,.wf-divider::after{content:'';flex:1;height:1px;background:#ddd}
.wf-google-btn{width:100%;border:1.5px solid #222;padding:7px;font-size:10px;font-family:monospace;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.wf-footer{background:#f0f0ea;border-top:1.5px solid #222;padding:14px 16px}
.wf-footer-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.wf-footer h5{font-size:9px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.wf-footer p,.wf-footer a{font-size:8px;color:#666;display:block;margin-bottom:2px}
.wf-footer-bottom{border-top:1px solid #ccc;margin-top:10px;padding-top:8px;font-size:8px;color:#888;display:flex;justify-content:space-between}
/* Filter panel */
.filter-panel{border:1.5px solid #222;padding:10px;background:#f9f9f7}
.filter-panel h4{font-size:10px;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #ddd}
/* Dashboard */
.dash-layout{display:flex;min-height:400px}
.dash-sidebar{width:160px;background:#111;padding:12px 8px;flex-shrink:0}
.dash-sidebar h3{color:#555;font-size:8px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dash-nav li{list-style:none;padding:6px 8px;font-size:9px;color:#aaa;border-left:2px solid transparent;cursor:pointer;margin-bottom:2px}
.dash-nav li:hover,.dash-nav li.active{color:#fff;border-left:2px solid #fff;background:#222}
.dash-main{flex:1;padding:14px}
.dash-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.stat-card{border:1.5px solid #222;padding:10px;text-align:center}
.stat-card .stat-num{font-size:20px;font-weight:700;margin-bottom:2px}
.stat-card .stat-label{font-size:8px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.wf-table{width:100%;border-collapse:collapse;font-size:9px}
.wf-table th{background:#222;color:#fff;padding:6px 10px;text-align:left;font-size:9px}
.wf-table td{padding:6px 10px;border-bottom:1px solid #eee}
.wf-table tr:nth-child(even) td{background:#f9f9f7}
.wf-table .td-actions{display:flex;gap:4px}
.wf-table .ta-btn{border:1px solid #222;padding:2px 6px;font-size:8px;cursor:pointer;font-family:monospace}
/* Event card */
.event-card{border:1.5px solid #222;padding:10px}
.event-date{font-size:9px;color:#888;margin-bottom:4px}
.event-type{display:inline-block;border:1px solid #222;padding:1px 6px;font-size:8px;margin-bottom:4px}
/* Help */
.faq-item{border:1px solid #ddd;padding:8px 10px;margin-bottom:4px}
.faq-item summary{font-size:10px;font-weight:700;cursor:pointer}
/* Ticket */
.ticket-box{border:1.5px solid #222;padding:14px;max-width:480px}
/* Mobile specific */
.mob-header{padding:10px 12px;border-bottom:1.5px solid #222;display:flex;align-items:center;justify-content:space-between}
.mob-menu-icon{font-size:14px;font-weight:700}
.mob-book-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mob-nav-bottom{border-top:1.5px solid #222;display:flex;background:#fff}
.mob-nav-bottom span{flex:1;text-align:center;padding:8px 4px;font-size:8px;border-right:1px solid #eee}
.mob-nav-bottom span:last-child{border-right:none}
/* Flow arrows */
.flow-note{display:inline-block;background:#fffde7;border:1px dashed #ccc;font-size:8px;padding:2px 6px;color:#888;margin-left:6px}
/* Figma panel */
.figma-panel{background:#111;color:#0f0;font-family:monospace;font-size:10px;padding:12px;max-height:300px;overflow-y:auto;border:1.5px solid #333}
.figma-panel pre{white-space:pre-wrap;line-height:1.6}
</style>

<div class="wf-app">
  <!-- Top bar -->
  <div class="top-bar">
    <h1>BU E-LIBRARY — WIREFRAME SYSTEM</h1>
    <div class="screen-tabs" id="screenTabs">
      <button class="stab active" onclick="showScreen('home')">Home</button>
      <button class="stab" onclick="showScreen('ebooks')">E-Books</button>
      <button class="stab" onclick="showScreen('events')">Events</button>
      <button class="stab" onclick="showScreen('special')">Special Books</button>
      <button class="stab" onclick="showScreen('services')">Services</button>
      <button class="stab" onclick="showScreen('auth')">Auth</button>
      <button class="stab" onclick="showScreen('admin')">Admin Dash</button>
      <button class="stab" onclick="showScreen('staff')">Staff Dash</button>
      <button class="stab" onclick="showScreen('user')">User Dash</button>
      <button class="stab" onclick="showScreen('forms')">Forms</button>
      <button class="stab" onclick="showScreen('help')">Help</button>
      <button class="stab" onclick="showScreen('figma')">Figma JSON</button>
    </div>
    <div class="view-toggle">
      <button class="vtbtn active" id="deskBtn" onclick="setView('desktop')">Desktop</button>
      <button class="vtbtn" id="mobBtn" onclick="setView('mobile')">Mobile</button>
    </div>
  </div>

  <div class="wf-body">
    <!-- Sidebar navigation -->
    <div class="wf-sidebar">
      <div class="wf-sidebar-group">
        <h3>Pages</h3>
        <ul class="wf-snav">
          <li class="active" onclick="showScreen('home')">Home Page</li>
          <li onclick="showScreen('ebooks')">E-Books</li>
          <li onclick="showScreen('events')">Digital Events</li>
          <li onclick="showScreen('special')">Special Books</li>
          <li onclick="showScreen('services')">Services</li>
        </ul>
      </div>
      <div class="wf-sidebar-group">
        <h3>Auth</h3>
        <ul class="wf-snav">
          <li onclick="showScreen('auth')">Login / Sign Up</li>
        </ul>
      </div>
      <div class="wf-sidebar-group">
        <h3>Dashboards</h3>
        <ul class="wf-snav">
          <li onclick="showScreen('admin')">Admin</li>
          <li onclick="showScreen('staff')">Staff</li>
          <li onclick="showScreen('user')">User</li>
        </ul>
      </div>
      <div class="wf-sidebar-group">
        <h3>Forms</h3>
        <ul class="wf-snav">
          <li onclick="showScreen('forms')">All Forms</li>
          <li onclick="showScreen('help')">Help / Contact</li>
        </ul>
      </div>
      <div class="wf-sidebar-group">
        <h3>Export</h3>
        <ul class="wf-snav">
          <li onclick="showScreen('figma')">Figma JSON</li>
        </ul>
      </div>
    </div>

    <!-- Canvas -->
    <div class="wf-canvas" id="wfCanvas">
      <!-- Content injected here -->
    </div>
  </div>
</div>

<script>
let currentView = 'desktop';

const NAV_BAR = `
<div class="wf-header">
  <div class="wf-logo">BU E-LIBRARY</div>
  <div class="wf-nav">
    <span class="active-nav">Home</span>
    <span>E-Books</span>
    <span>Digital Events</span>
    <span>Services</span>
    <span>Special Books</span>
    <span>Help</span>
  </div>
  <div class="wf-nav">
    <span>Login</span>
    <span class="wf-nav-btn">Sign Up</span>
  </div>
</div>`;

const MOB_NAV = `
<div class="mob-header">
  <div class="wf-logo" style="font-size:9px">BU E-LIBRARY</div>
  <div class="mob-menu-icon">☰</div>
</div>`;

const MOB_BOTTOM = `
<div class="mob-nav-bottom">
  <span>Home</span><span>Books</span><span>Events</span><span>Account</span><span>Help</span>
</div>`;

const FOOTER = `
<div class="wf-footer">
  <div class="wf-footer-grid">
    <div>
      <h5>BU E-Library</h5>
      <p>A digital resource hub for Bugema University students, staff and faculty.</p>
    </div>
    <div>
      <h5>Quick Links</h5>
      <a>E-Books</a><a>Digital Events</a><a>Services</a><a>Special Books</a><a>Help</a>
    </div>
    <div>
      <h5>Services</h5>
      <a>Printing Services</a><a>Research Support</a><a>Book Requests</a><a>Event Registration</a>
    </div>
    <div>
      <h5>Contact</h5>
      <p>📍 Bugema University, Kampala</p>
      <p>✉ library@bu.ac.ug</p>
      <p>📞 +256 xxx xxx xxx</p>
    </div>
  </div>
  <div class="wf-footer-bottom">
    <span>© 2025 Bugema University E-Library</span>
    <span>Privacy Policy · Terms of Use · Accessibility</span>
  </div>
</div>`;

const screens = {
  home: () => `
<div style="font-size:10px;color:#888;margin-bottom:10px">📄 HOME PAGE — Desktop Wireframe <span class="flow-note">↓ Scroll for full layout</span></div>
<div class="wf-screen">
  ${NAV_BAR}
  <!-- Hero -->
  <div class="wf-hero">
    <span class="wf-annotation" style="top:6px;right:8px">ANNOTATION: Search is primary CTA. Auto-suggest enabled.</span>
    <div class="wf-hero-title">Explore the BU Digital Library</div>
    <div class="wf-hero-sub">Access e-books, research resources, digital events and more</div>
    <div class="wf-searchbar">
      <input placeholder="Search by title, author, ISBN, subject…" readonly>
      <button>SEARCH</button>
    </div>
    <div style="font-size:9px;color:#888;margin-top:8px">Popular: Academic Research · Engineering · Theology · Medicine · Law</div>
    <div style="height:60px;background:#ddd;margin-top:14px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#888">[HERO IMAGE PLACEHOLDER — Library or campus illustration]</div>
  </div>
  <!-- Featured Books -->
  <div class="wf-section">
    <div class="wf-section-label">Featured Books</div>
    <div class="book-grid">
      ${[1,2,3,4].map(i=>`
      <div class="book-card">
        <div class="book-thumb">[COVER ${i}]</div>
        <div class="book-title">Book Title ${i}</div>
        <div class="book-author">Author Name</div>
        <button class="book-btn filled">View Book</button>
      </div>`).join('')}
    </div>
    <div style="text-align:right;margin-top:10px"><button class="wf-btn sm">Browse All E-Books →</button></div>
  </div>
  <!-- Announcements -->
  <div class="wf-section">
    <div class="wf-section-label">Announcements & Digital Events</div>
    <div class="wf-3col">
      ${[1,2,3].map(i=>`
      <div class="event-card">
        <div class="event-type">WEBINAR</div>
        <h4 style="font-size:10px;font-weight:700;margin-bottom:3px">Digital Event Title ${i}</h4>
        <div class="event-date">📅 Jan ${10+i}, 2025 · 10:00 AM</div>
        <p style="font-size:8px;color:#666;margin:4px 0">Short description of the event. Open to all students and staff.</p>
        <button class="wf-btn sm">Register</button>
      </div>`).join('')}
    </div>
    <div style="text-align:right;margin-top:8px"><button class="wf-btn sm">View All Events →</button></div>
  </div>
  <!-- Why Choose Us -->
  <div class="wf-section">
    <div class="wf-section-label">Why Choose Us</div>
    <div class="wf-4col">
      ${['24/7 Access','1000+ E-Books','Expert Research Support','Secure & Private'].map((t,i)=>`
      <div class="wf-card">
        <div style="width:32px;height:32px;border:1.5px solid #222;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:6px">${['📚','🔍','🎓','🔒'][i]}</div>
        <h4>${t}</h4>
        <p>Brief benefit description supporting this feature.</p>
      </div>`).join('')}
    </div>
  </div>
  ${FOOTER}
</div>`,

  ebooks: () => `
<div style="font-size:10px;color:#888;margin-bottom:10px">📄 E-BOOKS PAGE <span class="flow-note">→ Click "Request a Book" opens form modal</span></div>
<div class="wf-screen">
  ${NAV_BAR}
  <div class="wf-section">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:13px;font-weight:700">E-Books Catalogue</div>
      <button class="wf-btn filled sm">+ Request a Book</button>
    </div>
    <div class="wf-2col" style="align-items:start">
      <!-- Filter panel -->
      <div style="grid-column:1;max-width:200px">
        <div class="filter-panel">
          <h4>Filter & Search</h4>
          <div class="wf-input-group">
            <label>Title</label>
            <input class="wf-input" placeholder="Search title…" readonly>
          </div>
          <div class="wf-input-group">
            <label>Author</label>
            <input class="wf-input" placeholder="Search author…" readonly>
          </div>
          <div class="wf-input-group">
            <label>Category</label>
            <select class="wf-select"><option>All Categories</option><option>Science</option><option>Theology</option><option>Engineering</option></select>
          </div>
          <div class="wf-input-group">
            <label>Availability</label>
            <select class="wf-select"><option>All</option><option>Available</option><option>Request Only</option></select>
          </div>
          <button class="wf-btn filled" style="width:100%">Apply Filters</button>
          <div style="margin-top:6px"><button class="wf-btn" style="width:100%;margin-top:4px">Clear</button></div>
        </div>
      </div>
      <!-- Book listing -->
      <div>
        <div style="font-size:9px;color:#888;margin-bottom:8px">Showing 1–12 of 342 results</div>
        <div class="book-grid">
          ${[1,2,3,4,5,6,7,8].map(i=>`
          <div class="book-card">
            <div class="book-thumb">[IMG]</div>
            <div class="book-badge" style="font-size:7px;border:1px solid #ccc;padding:1px 4px;margin-bottom:3px;display:inline-block">${['PDF','EPUB','PDF','EPUB'][i%4]}</div>
            <div class="book-title">Book Title ${i}</div>
            <div class="book-author">Author ${i}</div>
            <div style="font-size:8px;color:#888;margin-bottom:4px">Category: Engineering</div>
            <button class="book-btn filled" style="width:100%">Read / Download</button>
          </div>`).join('')}
        </div>
        <!-- Pagination -->
        <div style="display:flex;gap:4px;justify-content:center;margin-top:12px">
          ${[1,2,3,'...',28].map(p=>`<button class="wf-btn sm">${p}</button>`).join('')}
        </div>
      </div>
    </div>
  </div>
  <!-- Request Book Modal hint -->
  <div style="margin:10px 16px 0;border:1.5px dashed #bbb;padding:10px;background:#fffde7">
    <div style="font-size:9px;color:#888">📌 FLOW NOTE: "Request a Book" button opens the Request Form (see Forms section). Admin is notified on submission.</div>
  </div>
  ${FOOTER}
</div>`,

  events: () => `
<div style="font-size:10px;color:#888;margin-bottom:10px">📄 DIGITAL EVENTS PAGE <span class="flow-note">→ Register opens Event Registration Form</span></div>
<div class="wf-screen">
  ${NAV_BAR}
  <div class="wf-section">
    <div style="font-size:13px;font-weight:700;margin-bottom:4px">Digital Events</div>
    <div style="font-size:9px;color:#888;margin-bottom:12px">Webinars, workshops, and digital literacy events hosted by BU Library</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <select class="wf-select" style="width:auto">
        <option>All Types</option><option>Webinar</option><option>Workshop</option><option>Seminar</option>
      </select>
      <input class="wf-input" style="width:220px" placeholder="Search events…" readonly>
      <input class="wf-input" style="width:140px" placeholder="Date range…" readonly>
    </div>
    <div class="wf-3col">
      ${['Research Writing Workshop','Library Orientation Webinar','Digital Literacy Seminar','Thesis Support Session','Academic Publishing Talk','Open Access Forum'].map((t,i)=>`
      <div class="event-card">
        <div style="background:#e8e8e0;height:80px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#888;margin-bottom:8px;border:1px solid #ccc">[EVENT BANNER]</div>
        <div class="event-type">${['WEBINAR','WORKSHOP','SEMINAR'][i%3]}</div>
        <h4 style="font-size:10px;font-weight:700;margin:4px 0">${t}</h4>
        <div class="event-date">📅 Feb ${5+i}, 2025 · 2:00 PM</div>
        <p style="font-size:8px;color:#666;margin:4px 0 6px;line-height:1.5">Short event description. Venue: Virtual / Main Library Hall.</p>
        <div style="display:flex;gap:6px">
          <button class="wf-btn filled sm">Register</button>
          <button class="wf-btn sm">Details</button>
        </div>
      </div>`).join('')}
    </div>
  </div>
  <!-- Printing Services -->
  <div class="wf-section">
    <div class="wf-section-label">Printing Services</div>
    <div class="wf-2col">
      <div class="wf-card">
        <h4>Printing & Scanning</h4>
        <p>Submit print jobs digitally. Supported formats: PDF, DOCX. Max 50 pages per request.</p>
        <div style="margin-top:8px"><button class="wf-btn sm filled">Submit Print Request</button></div>

function showScreen(name) {
  document.querySelectorAll('.stab').forEach(t => t.classList.remove('active'));
  const matched = [...document.querySelectorAll('.stab')].find(t => t.getAttribute('onclick') === `showScreen('${name}')`);
  if (matched) matched.classList.add('active');
  document.querySelectorAll('.wf-snav li').forEach(li => li.classList.remove('active'));

  const canvas = document.getElementById('wfCanvas');
  let content;
  if (currentView === 'mobile' && mobileScreens[name]) {
    canvas.classList.add('mobile-view');
    content = mobileScreens[name]();
  } else {
    canvas.classList.remove('mobile-view');
    content = screens[name] ? screens[name]() : `<div style="padding:20px;color:#888;font-size:10px">Screen "${name}" not available in this view.</div>`;
  }
  canvas.innerHTML = content;
}

function setView(v) {
  currentView = v;
  document.getElementById('deskBtn').classList.toggle('active', v === 'desktop');
  document.getElementById('mobBtn').classList.toggle('active', v === 'mobile');
  // Re-render current screen
  const active = document.querySelector('.stab.active');
  if (active) active.click();
}

function copyFigma() {
  const text = document.getElementById('figmaJson').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy JSON to Clipboard', 2000);
  });
}
